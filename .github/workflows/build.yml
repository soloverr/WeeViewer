name: Build Multi-Platform Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: WeeViewer-linux
            asset_name: WeeViewer-linux-x64
          - os: macos-latest
            artifact_name: WeeViewer-macos
            asset_name: WeeViewer-macos-x64
          - os: windows-latest
            artifact_name: WeeViewer-windows
            asset_name: WeeViewer-windows-x64

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller wxPython lxml pyperclip reportlab

    - name: Build binary
      run: |
        pyinstaller viewer.spec --clean

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          dist/WeeViewer.exe
          dist/WeeViewer
          dist/WeeViewer.app
        retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v4
      with:
        name: WeeViewer-windows
        path: windows

    - name: Download Linux artifact
      uses: actions/download-artifact@v4
      with:
        name: WeeViewer-linux
        path: linux

    - name: Download macOS artifact
      uses: actions/download-artifact@v4
      with:
        name: WeeViewer-macos
        path: macos

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows/WeeViewer.exe
          linux/WeeViewer
          macos/WeeViewer.app
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}